<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunar Lander - TIC-Labs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #1a1c2c;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      padding: 6px 16px;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .top-bar a {
      color: #7b8cff;
      text-decoration: none;
      font-size: 13px;
    }
    .top-bar a:hover { text-decoration: underline; }
    .top-bar h1 {
      font-size: 15px;
      color: #fff;
      font-weight: normal;
    }
    .game-frame {
      flex: 1;
      border: none;
      width: 100%;
    }
    .info-bar {
      padding: 4px 16px;
      background: #0f0f1a;
      font-size: 11px;
      color: #566c86;
      flex-shrink: 0;
      display: flex;
      gap: 16px;
    }
    .info-bar .ctrl { color: #7b8cff; }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="../">&larr; Gallery</a>
    <h1>Lunar Lander</h1>
  </div>
  <iframe class="game-frame" src="play/index.html" allowfullscreen></iframe>
  <div class="info-bar">
    <span class="ctrl">Arrow keys to rotate, Z to thrust</span>
    <span>Land the lunar module safely on the landing pad. Watch your fuel, velocity, and angle!</span>
    <span>by tic-labs</span>
  </div>
</body>
</html>
