name: Build & Deploy TIC-80 Gallery

on:
  push:
    branches: ['**']
    paths:
      - 'games/**'
      - 'build/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install TIC-80
        run: |
          wget -q https://github.com/nesbox/TIC-80/releases/download/v1.1.2837/tic80-v1.1-linux.deb
          sudo dpkg -i tic80-v1.1-linux.deb || sudo apt-get install -f -y
          which tic80 || echo "tic80 not in PATH, checking /usr/bin/ and /usr/local/bin/"
          ls /usr/bin/tic80* /usr/local/bin/tic80* 2>/dev/null || true

      - name: Install virtual framebuffer
        run: sudo apt-get install -y xvfb

      - name: Cache PICO-8
        id: cache-pico8
        uses: actions/cache@v4
        with:
          path: ~/pico8
          # Bump the version suffix to force a fresh download (e.g. after
          # PICO-8 updates or PICO8_URL changes).
          key: pico8-linux-v1

      - name: Fetch PICO-8
        if: steps.cache-pico8.outputs.cache-hit != 'true'
        env:
          PICO8_URL: ${{ secrets.PICO8_URL }}
        run: |
          if [ -z "$PICO8_URL" ]; then
            echo "::warning::PICO8_URL secret not set; PICO-8 carts will be skipped."
            exit 0
          fi
          curl -fsSL "$PICO8_URL" -o pico8.zip
          mkdir -p "$HOME/pico8"
          unzip -q pico8.zip -d "$HOME/pico8"
          rm pico8.zip

      - name: Set up PICO-8
        run: |
          # The Lexaloffle zip extracts to pico-8/pico8 (binary) plus pico8.dat etc.
          BIN="$(find "$HOME/pico8" -maxdepth 3 -type f -name pico8 2>/dev/null | head -n1)"
          if [ -z "$BIN" ]; then
            echo "::warning::PICO-8 binary not available; carts will be skipped."
            exit 0
          fi
          chmod +x "$BIN"
          # PICO-8 dynamically links SDL2 + GL. libsdl2 already pulls in the
          # alsa/pulse libs as deps, but GL has to be installed explicitly.
          sudo apt-get install -y \
            libsdl2-2.0-0 libsdl2-mixer-2.0-0 \
            libgl1 libglu1-mesa
          echo "PICO8_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Build game gallery
        run: python3 build/build.py
        env:
          TIC80_PATH: tic80

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
