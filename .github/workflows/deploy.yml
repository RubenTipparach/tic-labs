name: Build & Deploy TIC-80 Gallery

on:
  push:
    branches: [main]
    paths:
      - 'games/**'
      - 'build/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install TIC-80
        run: |
          wget -q https://github.com/nesbox/TIC-80/releases/download/v1.1.2837/tic80-v1.1-linux.deb
          sudo dpkg -i tic80-v1.1-linux.deb || sudo apt-get install -f -y
          which tic80 || echo "tic80 not in PATH, checking /usr/bin/ and /usr/local/bin/"
          ls /usr/bin/tic80* /usr/local/bin/tic80* 2>/dev/null || true

      - name: Install virtual framebuffer
        run: sudo apt-get install -y xvfb

      - name: Build game gallery
        run: python3 build/build.py
        env:
          TIC80_PATH: tic80

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
